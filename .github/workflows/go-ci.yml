name: Go CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
      - main

jobs:
  test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "These files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          go build -v -o /tmp/myworktree ./cmd/myworktree
          go build -v -o /tmp/mw ./cmd/mw
