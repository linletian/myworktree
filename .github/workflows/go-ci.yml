name: Go CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          go build -v -o /tmp/myworktree ./cmd/myworktree
          go build -v -o /tmp/mw ./cmd/mw
